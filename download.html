<body>

<h2>ZIPが生成されました</h2>

<button id="downloadBtn">ダウンロード</button>

<script>
const url = sessionStorage.getItem("generatedZip");
const name = sessionStorage.getItem("zipName");

document.getElementById("downloadBtn").onclick = () => {
    const a = document.createElement("a");
    a.href = url;
    a.download = name;
    a.click();
};
</script>
